name: build

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:

          # Linux x86_64
          - os: ubuntu-latest
            name: linux-x64
            exe: ""
            nim_flags: "--cc:gcc --gcc.exe=musl-gcc --passL:-static"

          # Linux ARM64
          - os: ubuntu-24.04-arm
            name: linux-arm64
            exe: ""
            nim_flags: "--cc:gcc --gcc.exe=musl-gcc --passL:-static"

          # Linux ARMv7 (armhf)
          - os: ubuntu-latest
            name: linux-armv7
            exe: ""
            nim_flags: "--cpu:arm --cc:gcc --gcc.exe=musl-gcc --passC:-march=armv7-a --passC:-mfpu=neon --passC:-mfloat-abi=hard --passL:-static"

          # Windows
          - os: windows-latest
            name: windows-x64
            exe: ".exe"
            nim_flags: ""

          # macOS Universal (Apple Silicon + Intel)
          - os: macos-latest
            name: macos-universal
            exe: ""
            nim_flags: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Cache Nim installation + compilation artifacts
      - name: Cache Nim
        id: cache-nim
        uses: actions/cache@v4
        with:
          path: |
            .nim_runtime
            ~/.nimble
            nimcache
          key: ${{ runner.os }}-${{ matrix.name }}-nim-stable

      # Install Nim (skipped on cache hit)
      - name: Install Nim
        if: steps.cache-nim.outputs.cache-hit != 'true'
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: stable

      - name: Add Nim to PATH (from cache)
        if: steps.cache-nim.outputs.cache-hit == 'true'
        shell: bash
        run: |
          echo "$PWD/.nim_runtime/bin" >> "$GITHUB_PATH"
          echo "$HOME/.nimble/bin" >> "$GITHUB_PATH"

      # Install musl for Linux
      - name: Install musl toolchain
        if: startsWith(matrix.name, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl musl-tools gcc zip

      - name: Install ARMv7 cross-compiler
        if: matrix.name == 'linux-armv7'
        run: sudo apt-get install -y gcc-arm-linux-gnueabihf

      # Build (non-macOS)
      - name: Build
        if: matrix.name != 'macos-universal'
        shell: bash
        run: |
          nim c \
            -d:release \
            --gc:orc \
            -d:strip \
            ${{ matrix.nim_flags }} \
            -o:nimble_flowers${{ matrix.exe }} \
            nimble_flowers.nim

      # Build macOS universal binary (ARM64 + x86_64)
      - name: Build macOS Universal
        if: matrix.name == 'macos-universal'
        run: |
          # Build for Apple Silicon (native)
          nim c \
            -d:release \
            --gc:orc \
            -d:strip \
            -o:nimble_flowers-arm64 \
            nimble_flowers.nim

          # Build for Intel
          nim c \
            -d:release \
            --gc:orc \
            -d:strip \
            --passC:"-target x86_64-apple-darwin" \
            --passL:"-target x86_64-apple-darwin" \
            -o:nimble_flowers-x64 \
            nimble_flowers.nim

          # Combine into universal binary
          lipo -create -output nimble_flowers nimble_flowers-arm64 nimble_flowers-x64
          echo "Universal binary architectures:"
          lipo -info nimble_flowers

      # Zip Linux builds for convenience
      - name: Zip Linux builds
        if: startsWith(matrix.name, 'linux')
        run: |
          zip -r nimble_flowers-${{ matrix.name }}.zip nimble_flowers${{ matrix.exe }}

      # Create or attach to GitHub release
      - name: Upload to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: CI-Builds
          name: CI-Builds
          artifacts: |
            nimble_flowers${{ matrix.exe }}
            nimble_flowers-${{ matrix.name }}.zip
          allowUpdates: true
          replacesArtifacts: true
